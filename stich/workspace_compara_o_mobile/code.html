<!DOCTYPE html>

<html lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>Humanizador - Workspace Editorial Mobile</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

                extend: {
                    "colors": {
                        "background": "#f9f9ff",

                        "surface-container-low": "#f1f3ff",
                        "secondary-fixed": "#cce5ff",
                        "surface-container": "#e8eeff",
                        "on-primary-fixed-variant": "#80281b",
                        "on-error": "#ffffff",
                        "surface-container-lowest": "#ffffff",
                        "surface-bright": "#f9f9ff",
                        "error": "#ba1a1a",
                        "tertiary-container": "#7a7371",
                        "on-background": "#161c27",
                        "primary-container": "#bd5444",
                        "on-primary-fixed": "#400200",
                        "tertiary-fixed-dim": "#cdc5c2",
                        "on-secondary-fixed-variant": "#31495e",
                        "surface-dim": "#d4daea",
                        "tertiary": "#615b59",
                        "inverse-surface": "#2a303d",
                        "on-secondary-fixed": "#011d31",
                        "on-tertiary": "#ffffff",
                        "on-surface-variant": "#56423e",
                        "surface-variant": "#dde2f3",
                        "secondary-container": "#c9e2fd",
                        "on-secondary-container": "#4d657b",
                        "surface-container-high": "#e3e8f9",
                        "secondary-fixed-dim": "#b0c9e3",
                        "secondary": "#496177",
                        "on-primary": "#ffffff",
                        "outline": "#89726d",
                        "inverse-on-surface": "#ecf0ff",
                        "surface": "#f9f9ff",
                        "on-tertiary-fixed-variant": "#4b4644",
                        "outline-variant": "#ddc0bb",
                        "on-tertiary-container": "#fffbff",
                        "on-secondary": "#ffffff",
                        "primary-fixed-dim": "#ffb4a7",
                        "error-container": "#ffdad6",
                        "on-error-container": "#93000a",
                        "primary": "#9d3d2e",
                        "inverse-primary": "#ffb4a7",
                        "surface-container-highest": "#dde2f3",
                        "on-primary-container": "#fffbff",
                        "tertiary-fixed": "#eae0de",
                        "on-surface": "#161c27",
                        "primary-fixed": "#ffdad4",
                        "on-tertiary-fixed": "#1f1b19"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "gutter": "24px",
                        "unit": "8px",
                        "margin-mobile": "16px",
                        "margin-desktop": "40px",
                        "container-max": "1280px",
                        "safe-bottom": "env(safe-area-inset-bottom)"
                    },
                    "fontFamily": {
                        "body-sm": ["Inter"],
                        "headline-lg": ["Inter"],
                        "label-md": ["Inter"],
                        "headline-xl-mobile": ["Inter"],

                        "body-md": ["Inter"],
                        "headline-xl": ["Inter"]
                    },
                    "fontSize": {
                        "body-sm": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "headline-lg": ["28px", { "lineHeight": "36px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "label-md": ["13px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "headline-xl-mobile": ["30px", { "lineHeight": "36px", "letterSpacing": "-0.01em", "fontWeight": "700" }],
                        "label-sm": ["11px", { "lineHeight": "14px", "letterSpacing": "0.03em", "fontWeight": "600" }],

            }

<style>
        /* Hide scrollbar for tab row but keep functionality */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        
        /* Ensure textarea takes remaining space correctly in flex column */
        textarea {
            resize: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background text-on-background font-body-sm h-screen flex flex-col overflow-hidden antialiased">
<!-- Task-Focused Header (Navigation Shell Suppressed for deep focus) -->
<header class="flex-none bg-surface/90 backdrop-blur-md px-margin-mobile py-3 flex items-center justify-between border-b border-surface-variant z-20">
<button aria-label="Voltar" class="text-secondary hover:text-on-background transition-colors p-2 -ml-2 rounded-full">
<span class="material-symbols-outlined text-[24px]">arrow_back</span>
</button>
<!-- Status Badge: Em Revisão (Pale Terracotta style mapping to primary-fixed) -->
<div class="flex items-center px-3 py-1 bg-primary-fixed rounded-full">
<span class="font-label-sm text-label-sm text-on-primary-fixed uppercase tracking-wider">Em Revisão</span>
</div>
<button aria-label="Opções do documento" class="text-secondary hover:text-on-background transition-colors p-2 -mr-2 rounded-full">
<span class="material-symbols-outlined text-[24px]">more_vert</span>
</button>
</header>
<!-- Compact Tab Selector (Horizontal Scroll) -->
<nav aria-label="Versões do texto" class="flex-none bg-surface border-b border-surface-variant overflow-x-auto no-scrollbar z-10">
<div class="flex px-margin-mobile py-2 space-x-2">
<button class="px-4 py-2 rounded-full font-label-md text-label-md text-secondary hover:bg-surface-container transition-colors whitespace-nowrap">
                Base
            </button>
<button aria-current="page" class="px-4 py-2 rounded-full font-label-md text-label-md bg-primary text-on-primary shadow-sm whitespace-nowrap">
                Final
            </button>
<button class="px-4 py-2 rounded-full font-label-md text-label-md text-secondary hover:bg-surface-container transition-colors whitespace-nowrap">
                Pub
            </button>
<button class="px-4 py-2 rounded-full font-label-md text-label-md text-secondary hover:bg-surface-container transition-colors whitespace-nowrap flex items-center gap-1">
                Hist <span class="material-symbols-outlined text-[14px]">history</span>
</button>
<button class="px-4 py-2 rounded-full font-label-md text-label-md text-primary border border-primary/20 hover:bg-primary/5 transition-colors whitespace-nowrap flex items-center gap-1"><span class="material-symbols-outlined text-[18px]">difference</span> Ver Alterações</button></div>
</nav>
<!-- Editorial Canvas -->
<main class="flex-1 overflow-y-auto px-margin-mobile py-6 flex flex-col pb-[120px]"> <!-- Extra padding bottom for fixed action bar -->
<!-- Document Title -->
<div class="mb-6 rounded-xl border border-surface-variant overflow-hidden bg-surface-container-low"><button class="w-full px-4 py-3 flex items-center justify-between text-secondary hover:bg-surface-container transition-colors"><div class="flex items-center gap-2"><span class="material-symbols-outlined text-[20px]">description</span><span class="font-label-md">Texto Base (Referência)</span></div><span class="material-symbols-outlined">expand_more</span></button><div class="hidden px-4 pb-4 text-body-sm text-on-surface-variant opacity-70 italic">O conteúdo original será exibido aqui para comparação rápida durante a edição do texto final.</div></div><div class="flex items-center gap-2 mb-2 text-primary"><span class="material-symbols-outlined text-[16px]">edit_note</span><span class="font-label-sm uppercase tracking-widest">Editando: Texto Final</span></div><textarea class="w-full bg-transparent border-none p-0 focus:ring-0 font-headline-xl-mobile text-headline-xl-mobile text-on-background placeholder:text-tertiary-fixed-dim mb-4" placeholder="Título da Publicação" rows="2">Estratégias de Comunicação Empática em Tempos de Crise Corporativa</textarea>
<!-- Document Body -->
<textarea class="w-full flex-1 bg-transparent border-none p-0 focus:ring-0 font-body-md text-body-md text-on-surface-variant placeholder:text-tertiary-fixed-dim leading-relaxed" placeholder="Comece a escrever ou cole seu texto base aqui...">A comunicação durante uma crise exige mais do que apenas clareza; exige uma demonstração genuína de empatia. Quando as estruturas corporativas são testadas, as respostas robóticas ou excessivamente jurídicas costumam alienar o público interno e externo. 

Para humanizar a mensagem, é crucial reconhecer o impacto emocional da situação antes de apresentar soluções operacionais. O tom deve ser acolhedor, transparente e, acima de tudo, focado nas pessoas afetadas. 

Neste contexto, a liderança deve assumir a linha de frente da comunicação, evitando delegar mensagens críticas apenas aos canais institucionais impessoais. A voz do líder, quando autêntica, serve como uma âncora de confiança.</textarea>
<!-- Floating Contextual Action (Grammar/AI suggestion indication) -->
<div class="mt-8 flex justify-end">
<button class="flex items-center gap-2 bg-secondary-container text-on-secondary-container px-4 py-2 rounded-full font-label-md text-label-md shadow-sm opacity-80 hover:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-[18px]">auto_awesome</span>
                Sugestões de tom
            </button>
</div>
</main>
<!-- Fixed Bottom Action Bar (Glassmorphism) -->
<div class="fixed bottom-0 left-0 w-full bg-surface-container-highest/90 backdrop-blur-xl border-t border-secondary/15 px-margin-mobile py-4 pb-[calc(1rem+env(safe-area-inset-bottom))] z-50">
<div class="flex items-center justify-between gap-4">
<!-- Secondary Tools -->
<div class="flex gap-2 text-secondary">
<button aria-label="Desfazer" class="p-2 rounded-full hover:bg-surface-variant transition-colors">
<span class="material-symbols-outlined">undo</span>
</button>
<button aria-label="Refazer" class="p-2 rounded-full hover:bg-surface-variant transition-colors">
<span class="material-symbols-outlined">redo</span>
</button>
</div>
<!-- Primary Action (Aprovar) -->
<button class="flex-1 bg-primary text-on-primary py-3 px-6 rounded-full font-label-md text-label-md flex items-center justify-center gap-2 shadow-sm active:scale-95 transition-transform">
<span class="material-symbols-outlined text-[20px]">check_circle</span>
                Aprovar Texto
            </button>
</div>
</div>
<!-- Script for auto-resizing textareas to content if needed (basic implementation) -->
<script>
        const textareas = document.querySelectorAll('textarea');
        textareas.forEach(textarea => {
            textarea.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = (this.scrollHeight) + 'px';
            });
            // Initial trigger
            textarea.style.height = 'auto';
            textarea.style.height = (textarea.scrollHeight) + 'px';
        });
    </script>
</body></html>
