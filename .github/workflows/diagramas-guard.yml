name: Guard de diagramas

on:
  push:
  pull_request:

jobs:
  validate-diagramas:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate diagrams
        run: npm run diagramas:check
